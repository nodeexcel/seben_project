services:
  db:
    image: postgres:16-alpine
    container_name: seben_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seben}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seben_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-seben_crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seben} -d ${POSTGRES_DB:-seben_crm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seben_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seben}:${POSTGRES_PASSWORD:-seben_dev_password}@db:5432/${POSTGRES_DB:-seben_crm}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DEBUG: ${DEBUG:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./samples:/app/samples
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seben_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
